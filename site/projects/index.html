<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Julian Hicks</title>
  <meta name="description" content="Personal projects by Julian Hicks — things built, shipped, or started and occasionally finished.">
  <link rel="icon" href="/assets/brand/logo/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/brand/export/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/assets/brand/export/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/assets/brand/export/apple-touch-icon.png">
  <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0B0B" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Projects — Julian Hicks">
  <meta property="og:description" content="Personal projects by Julian Hicks — things built, shipped, or started and occasionally finished.">
  <meta property="og:image" content="https://julian.levhicks.com/assets/brand/export/logo-512.png">
  <meta property="og:url" content="https://julian.levhicks.com/projects/">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    main { max-width: 520px; }
    .empty { color: var(--muted); font-style: italic; }
    /* Project listing */
    .project-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .project h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: 0;
      margin-bottom: 0.25rem;
    }

    .project .meta {
      color: var(--muted);
      font-size: 0.8125rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }

    .project .desc {
      font-size: 0.9375rem;
      color: var(--fg);
      margin-bottom: 0.75rem;
    }

    /* Row-laid-out gold links for per-project view/source */
    .project-links {
      display: flex;
      gap: 1.5rem;
    }

    .project-links a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.8125rem;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      display: inline-block;
      padding: 0.2rem 0;
      background-image: linear-gradient(var(--gold-hi), var(--gold-hi));
      background-size: 0% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease, color 0.15s ease;
    }

    .project-links a:hover,
    .project-links a:focus-visible {
      color: var(--gold-hi);
      background-size: 100% 1.5px;
      outline: none;
    }

    .project-links a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Back to home">
      <a class="back-link" href="/">&#8592; Home</a>
    </nav>
    <h1>Projects</h1>
    <p class="tagline">Things I've built, shipped, or started and occasionally finished.</p>
    <div class="rule" role="presentation"></div>
    <p class="empty">Nothing here yet.</p>
  </main>
</body>
</html>
