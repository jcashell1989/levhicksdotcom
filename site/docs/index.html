<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Julian Hicks</title>
  <meta name="description" content="Document lookup.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #F5F0E8;
      --fg:      #2B241B;
      --muted:   #5A5347;
      --green:   #3D6B3E;
      --gold:    #7A6020;
      --gold-hi: #B8922E;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Atkinson Hyperlegible Next', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 8rem;
    }

    main {
      max-width: 420px;
      width: 100%;
    }

    .back {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .back:hover,
    .back:focus-visible {
      color: var(--fg);
    }

    .back:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.9375rem;
      letter-spacing: 0.01em;
      margin-bottom: 2.5rem;
    }

    .rule {
      width: 2rem;
      height: 2px;
      background: var(--green);
      margin-bottom: 1.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    label {
      color: var(--muted);
      font-size: 0.8125rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="text"] {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--fg);
      border-radius: 0;
      color: var(--fg);
      font-family: inherit;
      font-size: 1.125rem;
      line-height: 1.5;
      padding: 1rem 0;
      width: 100%;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input[type="text"]:focus {
      border-bottom-color: var(--green);
    }

    input[type="text"]:focus-visible {
      border-bottom-color: var(--green);
    }

    button[type="submit"] {
      appearance: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      /* Match .links a pattern */
      color: var(--gold);
      font-weight: 700;
      font-size: 0.9375rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: inline-block;
      padding: 0.2rem 0;
      background-image: linear-gradient(var(--gold-hi), var(--gold-hi));
      background-size: 0% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease, color 0.15s ease;
    }

    button[type="submit"]:hover,
    button[type="submit"]:focus-visible {
      color: var(--gold-hi);
      background-size: 100% 1.5px;
      outline: none;
    }

    button[type="submit"]:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    .status {
      margin-top: 1.5rem;
      color: var(--muted);
      min-height: 1.5rem;
      font-size: 0.9375rem;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="/">← Home</a>
    <h1>Docs</h1>
    <p class="tagline">Enter a document code to continue.</p>
    <div class="rule" role="presentation"></div>
    <form id="lookup" novalidate>
      <div class="field">
        <label for="code">Document code</label>
        <input
          id="code"
          type="text"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="off"
          required
        >
      </div>
      <button type="submit">Look up →</button>
    </form>
    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script>
    const docs = {
      // Add new docs here
      "readme-2026": "/docs/readme-2026/",
      "brochure-foo": "/docs/brochure-foo/",
    };

    const form = document.getElementById("lookup");
    const input = document.getElementById("code");
    const status = document.getElementById("status");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const key = input.value.trim().toLowerCase();
      if (docs[key]) {
        window.location.href = docs[key];
      } else {
        status.textContent = "No document with that code.";
      }
    });

    input.addEventListener("input", function () {
      status.textContent = "";
    });
  </script>
</body>
</html>
