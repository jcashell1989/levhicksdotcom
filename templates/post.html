<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Julian Hicks</title>
  <meta name="description" content="{{EXCERPT}}">
  <meta name="robots" content="{{ROBOTS}}">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    /* Post pages read top-aligned and slightly larger than the rest of the site */
    body {
      align-items: flex-start;
      font-size: 1.0625rem;
      line-height: 1.7;
    }

    header.post-header { margin-bottom: 2.5rem; }

    header.post-header time {
      display: block;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.4rem;
    }

    header.post-header h1 {
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    header.post-header .rule { margin-bottom: 0; }

    article.prose h2 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-top: 2.25rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    article.prose h3 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-top: 1.75rem;
      margin-bottom: 0.5rem;
    }

    article.prose p { margin-bottom: 1.1rem; }

    article.prose ul,
    article.prose ol { margin: 0 0 1.25rem 1.25rem; }

    article.prose li { margin-bottom: 0.4rem; }

    article.prose a {
      color: var(--gold);
      text-decoration: none;
      background-image: linear-gradient(var(--gold-hi), var(--gold-hi));
      background-size: 100% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: color 0.15s ease;
    }

    article.prose a:hover,
    article.prose a:focus-visible { color: var(--gold-hi); outline: none; }

    article.prose a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    article.prose blockquote {
      border-left: 2px solid var(--green);
      padding-left: 1rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-style: italic;
    }

    article.prose code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.9em;
      background: rgba(43, 36, 27, 0.06);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }

    article.prose pre {
      background: rgba(43, 36, 27, 0.06);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      line-height: 1.55;
    }

    article.prose pre code { background: none; padding: 0; }
    article.prose strong { font-weight: 700; }
    article.prose em { font-style: italic; }

    .post-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(43, 36, 27, 0.1);
    }

    .post-footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      background-image: linear-gradient(var(--muted), var(--muted));
      background-size: 0% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease;
    }

    .post-footer a:hover,
    .post-footer a:focus-visible { background-size: 100% 1px; outline: none; }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Back to writing">
      <a class="back-link" href="/writing/">&#8592; Writing</a>
    </nav>
    <header class="post-header">
      <time datetime="{{DATE_ISO}}">{{DATE_HUMAN}}</time>
      <h1>{{TITLE}}</h1>
      <div class="rule" role="presentation"></div>
    </header>
    <article class="prose">
{{BODY}}
    </article>
    <footer class="post-footer">
      <a href="/writing/">&#8592; All writing</a>
    </footer>
  </main>
</body>
</html>
