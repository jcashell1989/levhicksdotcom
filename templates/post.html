<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Julian Hicks</title>
  <meta name="description" content="{{EXCERPT}}">
  <meta name="robots" content="{{ROBOTS}}">
  <link rel="icon" href="/assets/brand/logo/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/brand/export/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/assets/brand/export/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/assets/brand/export/apple-touch-icon.png">
  <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0B0B" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}} — Julian Hicks">
  <meta property="og:description" content="{{EXCERPT}}">
  <meta property="og:image" content="https://julian.levhicks.com/assets/brand/export/logo-512.png">
  <meta property="og:url" content="https://julian.levhicks.com/writing/{{SLUG}}/">
  <meta property="article:published_time" content="{{DATE_ISO}}">
  <link rel="alternate" type="application/atom+xml" title="Julian Hicks - Writing" href="/atom.xml">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    /* Post pages read top-aligned and slightly larger than the rest of the site */
    body {
      align-items: flex-start;
      font-size: 1.0625rem;
      line-height: 1.7;
    }

    header.post-header { margin-bottom: 2.5rem; }

    header.post-header time {
      display: block;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.4rem;
    }

    header.post-header h1 {
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    header.post-header .rule { margin-bottom: 0; }

    article.prose h2 {
      font-family: var(--font-sans);
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-top: 2.25rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    article.prose h3 {
      font-family: var(--font-sans);
      font-size: 1.125rem;
      font-weight: 700;
      margin-top: 1.75rem;
      margin-bottom: 0.5rem;
    }

    article.prose p { margin-bottom: 1.1rem; }

    article.prose ul,
    article.prose ol { margin: 0 0 1.25rem 1.25rem; }

    article.prose li { margin-bottom: 0.4rem; }

    article.prose a {
      color: var(--gold);
      text-decoration: none;
      background-image: linear-gradient(var(--gold), var(--gold));
      background-size: 100% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: color 0.15s ease;
    }

    article.prose a:hover,
    article.prose a:focus-visible { color: var(--gold-hi); outline: none; }

    article.prose a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    article.prose blockquote {
      margin: 1.5rem 0;
      padding: 0.25rem 0 0.25rem 1rem;
      border-left: 3px solid var(--green);
      color: var(--muted);
      font-style: italic;
    }
    article.prose blockquote p { margin-bottom: 0.5rem; }
    article.prose blockquote p:last-child { margin-bottom: 0; }

    article.prose code {
      background: rgba(43, 36, 27, 0.06);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }

    article.prose pre {
      background: rgba(43, 36, 27, 0.06);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      line-height: 1.55;
    }

    article.prose pre code { background: none; padding: 0; }
    article.prose strong { font-weight: 700; }
    article.prose em { font-style: italic; }

    article.prose figure {
      margin: 2rem auto;
      max-width: 100%;
    }
    article.prose figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
    }
    article.prose figcaption {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      line-height: 1.5;
    }

    .post-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(43, 36, 27, 0.1);
    }

    .post-footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      background-image: linear-gradient(var(--muted), var(--muted));
      background-size: 0% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease;
    }

    .post-footer a:hover,
    .post-footer a:focus-visible { background-size: 100% 1px; outline: none; }

    @media (prefers-color-scheme: dark) {
      article.prose code,
      article.prose pre {
        background: rgba(245, 240, 232, 0.07);
      }
      .post-footer {
        border-top-color: rgba(245, 240, 232, 0.1);
      }
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Back to writing">
      <a class="back-link" href="/writing/">&#8592; Writing</a>
    </nav>
    <header class="post-header">
      <time datetime="{{DATE_ISO}}">{{DATE_HUMAN}}</time>
      <h1 class="display">{{TITLE}}</h1>
      <div class="rule" role="presentation"></div>
    </header>
    <article class="prose">
{{BODY}}
    </article>
    <footer class="post-footer">
      <a href="/writing/">&#8592; All writing</a>
    </footer>
  </main>
</body>
</html>
