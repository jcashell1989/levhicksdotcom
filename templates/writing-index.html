<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Julian Hicks</title>
  <meta name="description" content="Essays, notes, and whatever else Julian Hicks finishes writing.">
  <link rel="icon" href="/assets/brand/logo/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/brand/export/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/assets/brand/export/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/assets/brand/export/apple-touch-icon.png">
  <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0B0B" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Writing — Julian Hicks">
  <meta property="og:description" content="Essays, notes, and whatever else Julian Hicks finishes writing.">
  <meta property="og:image" content="https://julian.levhicks.com/assets/brand/export/logo-512.png">
  <meta property="og:url" content="https://julian.levhicks.com/writing/">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .entry-list { list-style: none; }
    .entry { margin-bottom: 2rem; }

    .entry time {
      display: block;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.2rem;
    }

    .entry h2 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.35rem;
    }

    .entry h2 a {
      color: var(--gold);
      text-decoration: none;
      display: inline-block;
      background-image: linear-gradient(var(--gold-hi), var(--gold-hi));
      background-size: 0% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease, color 0.15s ease;
    }

    .entry h2 a:hover,
    .entry h2 a:focus-visible {
      color: var(--gold-hi);
      background-size: 100% 1.5px;
      outline: none;
    }

    .entry h2 a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    .excerpt { color: var(--muted); font-size: 0.9375rem; }
    .empty { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Back to home">
      <a class="back-link" href="/">&#8592; Home</a>
    </nav>
    <h1>Writing</h1>
    <p class="tagline">Essays, notes, and whatever else I finish.</p>
    <div class="rule" role="presentation"></div>
    <ul class="entry-list">
{{ENTRIES}}
    </ul>
  </main>
</body>
</html>
