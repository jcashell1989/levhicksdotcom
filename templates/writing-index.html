<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Julian Hicks</title>
  <meta name="description" content="Essays, notes, and whatever else Julian Hicks finishes writing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #F5F0E8;
      --fg:      #2B241B;
      --muted:   #5A5347;
      --green:   #3D6B3E;
      --gold:    #7A6020;
      --gold-hi: #B8922E;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Atkinson Hyperlegible Next', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 8rem;
    }

    main { max-width: 640px; width: 100%; }

    .back-link {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      background-image: linear-gradient(var(--muted), var(--muted));
      background-size: 0% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease;
    }

    .back-link:hover,
    .back-link:focus-visible { background-size: 100% 1px; outline: none; }

    .back-link:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.9375rem;
      letter-spacing: 0.01em;
      margin-bottom: 2.5rem;
    }

    .rule {
      width: 2rem;
      height: 2px;
      background: var(--green);
      margin-bottom: 1.75rem;
    }

    .entry-list { list-style: none; }

    .entry { margin-bottom: 2rem; }

    .entry time {
      display: block;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.2rem;
    }

    .entry h2 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.35rem;
    }

    .entry h2 a {
      color: var(--gold);
      text-decoration: none;
      display: inline-block;
      background-image: linear-gradient(var(--gold-hi), var(--gold-hi));
      background-size: 0% 1.5px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.2s ease, color 0.15s ease;
    }

    .entry h2 a:hover,
    .entry h2 a:focus-visible {
      color: var(--gold-hi);
      background-size: 100% 1.5px;
      outline: none;
    }

    .entry h2 a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    .excerpt { color: var(--muted); font-size: 0.9375rem; }

    .empty { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Back to home">
      <a class="back-link" href="/">&#8592; Home</a>
    </nav>
    <h1>Writing</h1>
    <p class="tagline">Essays, notes, and whatever else I finish.</p>
    <div class="rule" role="presentation"></div>
    <ul class="entry-list">
{{ENTRIES}}
    </ul>
  </main>
</body>
</html>
