<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Julian Hicks</title>
  <meta name="description" content="Essays, notes, and whatever else Julian Hicks finishes writing.">
  <link rel="icon" href="/assets/brand/logo/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/brand/export/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/assets/brand/export/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/assets/brand/export/apple-touch-icon.png">
  <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0B0B" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Writing — Julian Hicks">
  <meta property="og:description" content="Essays, notes, and whatever else Julian Hicks finishes writing.">
  <meta property="og:image" content="https://julian.levhicks.com/assets/brand/export/logo-512.png">
  <meta property="og:url" content="https://julian.levhicks.com/writing/">
  <link rel="alternate" type="application/atom+xml" title="Julian Hicks - Writing" href="/atom.xml">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    main { max-width: 520px; }
    .entry-list { list-style: none; }
    .entry {
      padding: 0.75rem 0;
      border-top: 1px solid rgba(43, 36, 27, 0.08);
    }

    .entry time {
      display: block;
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 4px;
    }

    .entry h2 {
      font-family: var(--font-serif);
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .entry h2 a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      text-decoration-color: rgba(43, 36, 27, 0.15);
      transition: text-decoration-color 400ms ease;
    }

    .entry h2 a:hover,
    .entry h2 a:focus-visible {
      text-decoration-color: var(--gold);
      outline: none;
    }

    .entry h2 a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 1px;
    }

    .excerpt { color: var(--muted); font-size: 0.9375rem; }
    .empty { color: var(--muted); font-style: italic; }

    @media (prefers-color-scheme: dark) {
      .entry { border-top-color: rgba(232, 225, 210, 0.08); }
      .entry h2 a { text-decoration-color: rgba(232, 225, 210, 0.15); }
    }
  </style>
</head>
<body>
  <main>
    <nav class="page-chrome" aria-label="Page navigation">
      <a href="/" class="header-mark" aria-label="home"><picture><source srcset="/assets/brand/logo/logo-mark-white.svg" media="(prefers-color-scheme: dark)"><img src="/assets/brand/logo/logo-mark-black.svg" alt="" width="28" height="28"></picture></a>
      <a class="back-link" href="/">&#8592; home</a>
    </nav>
    <div class="rule" role="presentation"></div>
    <h1>Writing</h1>
    <p class="tagline">Essays, notes, and whatever else I finish.</p>
    <ul class="entry-list">
{{ENTRIES}}
    </ul>
    <footer class="site-footer">
      &copy; <script>document.write(new Date().getFullYear())</script> Julian Hicks
    </footer>
  </main>
</body>
</html>
